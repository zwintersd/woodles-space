<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>palette · woodles.space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/shared/fonts.css" />
  <link rel="stylesheet" href="/shared/palette.css" />
  <link rel="stylesheet" href="/shared/motifs.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 1.6rem;
      background: var(--surface);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }
    .topbar-brand {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-decoration: none;
    }
    .topbar-brand:hover { color: var(--accent-strong); }
    .topbar-label {
      font-family: var(--font-mono);
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.55;
      margin-left: 1.2rem;
    }
    .topbar-shimmer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 2;
      max-width: 880px;
      margin: 0 auto;
      padding: calc(42px + 5rem) clamp(1.5rem, 5vw, 3rem) 6rem;
    }

    .page-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.4rem;
      animation: motif-rise 1s ease forwards;
    }
    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 7vw, 4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      line-height: 1.05;
      margin-bottom: 0.4rem;
      animation: motif-rise 1s ease forwards 0.1s;
      opacity: 0;
    }
    .page-sub {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 4rem;
      animation: motif-rise 1s ease forwards 0.2s;
      opacity: 0;
    }

    .theme-card {
      margin-bottom: 4rem;
      padding: 2rem;
      border-radius: 18px;
      border: 1px solid var(--rule);
      background: var(--surface);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: motif-rise 1.1s ease forwards 0.3s;
      opacity: 0;
    }
    .theme-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.6rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .theme-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.6rem;
      color: var(--accent-strong);
      font-weight: 300;
    }
    .theme-desc {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.7;
    }
    .swatches {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.6rem;
    }
    .swatch {
      aspect-ratio: 1.4 / 1;
      border-radius: 10px;
      border: 1px solid var(--rule);
      padding: 0.6rem 0.7rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .swatch-name {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      mix-blend-mode: difference;
      color: white;
      opacity: 0.85;
    }
    .swatch-hex {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      mix-blend-mode: difference;
      color: white;
      opacity: 0.6;
    }

    .preview-text {
      margin-top: 1.6rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--rule);
    }
    .preview-text h3 {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--accent-strong);
      margin-bottom: 0.4rem;
    }
    .preview-text p {
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
    }
    .preview-text p .muted { color: var(--muted); }
    .preview-text p .accent { color: var(--accent-deep); }

    .footnote {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-align: center;
      margin-top: 2rem;
      opacity: 0.55;
    }
  </style>
</head>
<body class="motif-paper">

  <div class="motif-grain"></div>

  <header class="topbar">
    <a href="/" class="topbar-brand">.space</a>
    <span class="topbar-label">palette</span>
    <div class="topbar-shimmer motif-shimmer-line"></div>
  </header>

  <div class="page-wrap">
    <p class="page-eyebrow">color systems</p>
    <h1 class="page-title">palette</h1>
    <p class="page-sub">named themes · drop into <code>data-theme</code></p>

    <div id="palette-cards"></div>

    <p class="footnote">defined in <code>shared/palette.css</code> · listed in <code>shared/library.js</code></p>
  </div>

  <script type="module">
    import { palettes } from '/shared/library.js';

    const SWATCH_KEYS = ['bg','text','muted','lavender','aqua','peach','lilac','lapis','plum'];

    // one preview blurb per theme — falls back to a generic line if missing
    const PREVIEWS = {
      cream:      { h: 'a quiet morning, somewhere.', p: 'headings sit in lapis, body in deep plum on warm <span class="muted">paper-white</span>. accents come in waves — <span class="accent">lavender, aqua, peach, lilac</span>.' },
      dawn:       { h: 'first light through a window.', p: 'soft pinks and warm gold for <span class="accent">morning pages</span>, half-formed thoughts, the kind of letter you write before coffee.' },
      dusk:       { h: 'after the sun, before the stars.', p: 'same vocabulary, lower light. accents <span class="accent">recede</span> into the dark; <span class="muted">muted text</span> is the rule, not the exception.' },
      midnight:   { h: 'awake when nothing else is.', p: 'true dark with electric edges. for the <span class="accent">3 a.m. draft</span> you might delete by morning, or might not.' },
      forest:     { h: 'a clearing, somewhere quiet.', p: 'moss and bark on parchment. for <span class="accent">nature notes</span>, slow observation, the long sentence about a single tree.' },
      terracotta: { h: 'sun on warm stone.', p: 'clay and ochre, <span class="accent">mediterranean afternoon</span>. for travelogues, memoir, the postcard you wrote in your head and never sent.' },
      inkwell:    { h: 'a navy card, gold at the edge.', p: 'the <span class="accent">formal letterhead</span>. dark blue paper, bone ink, gilt accents. when the occasion calls for it.' },
      typewriter: { h: 'a draft, kept in a drawer.', p: 'sepia and aged ink. for the <span class="accent">manuscript feel</span> — every word looking older than it is, by ten minutes.' },
      paper:      { h: 'just words, on a page.', p: 'no color. <span class="accent">ink on paper</span>. the <span class="muted">muted line</span> is a soft gray. for moments where the work should carry the room.' }
    };

    function readVar(el, name) {
      return getComputedStyle(el).getPropertyValue('--' + name).trim();
    }

    const wrap = document.getElementById('palette-cards');
    wrap.innerHTML = palettes.map(p =>
      '<section class="theme-card" data-theme="' + p.id + '">' +
        '<div class="theme-head">' +
          '<span class="theme-name">' + p.name + '</span>' +
          '<span class="theme-desc">' + p.desc + '</span>' +
        '</div>' +
        '<div class="swatches" id="swatches-' + p.id + '"></div>' +
        '<div class="preview-text">' +
          '<h3>' + (PREVIEWS[p.id]?.h || 'a sample of ' + p.name + '.') + '</h3>' +
          '<p>' + (PREVIEWS[p.id]?.p || 'this is what the body type looks like in <span class="accent">' + p.name + '</span>.') + '</p>' +
        '</div>' +
      '</section>'
    ).join('');

    // populate swatches after the cards mount so getComputedStyle resolves the right theme
    palettes.forEach(p => {
      const card = document.querySelector('.theme-card[data-theme="' + p.id + '"]');
      const target = document.getElementById('swatches-' + p.id);
      if (!card || !target) return;
      target.innerHTML = SWATCH_KEYS.map(k => {
        const hex = readVar(card, k);
        return '<div class="swatch" style="background:' + hex + '">' +
          '<span class="swatch-name">' + k + '</span>' +
          '<span class="swatch-hex">' + hex + '</span>' +
        '</div>';
      }).join('');
    });
  </script>

</body>
</html>
