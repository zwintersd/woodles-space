<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scaffold · woodles.space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/shared/fonts.css" />
  <link rel="stylesheet" href="/shared/palette.css" />
  <link rel="stylesheet" href="/shared/motifs.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 30;
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 1.6rem;
      background: var(--surface);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }
    .topbar-brand {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-decoration: none;
    }
    .topbar-brand:hover { color: var(--accent-strong); }
    .topbar-label {
      font-family: var(--font-mono);
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.55;
      margin-left: 1.2rem;
    }
    .topbar-shimmer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 2;
      max-width: 1080px;
      margin: 0 auto;
      padding: calc(42px + 5rem) clamp(1.5rem, 5vw, 3rem) 6rem;
    }

    .page-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.4rem;
      animation: motif-rise 1s ease forwards;
    }
    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 7vw, 4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      line-height: 1.05;
      margin-bottom: 0.4rem;
      animation: motif-rise 1s ease forwards 0.1s;
      opacity: 0;
    }
    .page-sub {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 4rem;
      animation: motif-rise 1s ease forwards 0.2s;
      opacity: 0;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.4rem;
    }
    .template-tile {
      position: relative;
      aspect-ratio: 5 / 7;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--rule);
      text-decoration: none;
      animation: motif-rise 1s ease forwards 0.3s;
      opacity: 0;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }
    .template-tile:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
    }
    .template-canvas {
      position: absolute;
      inset: 0;
      background: var(--bg);
      color: var(--text);
      padding: 1.6rem 1.4rem 4.4rem;
      overflow: hidden;
    }
    .template-canvas .pre-title {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
      margin-bottom: 0.7rem;
    }
    .template-canvas .pre-h1 {
      font-size: 1.15rem;
      line-height: 1.15;
      color: var(--accent-strong);
      font-weight: 300;
      font-style: italic;
      margin-bottom: 0.7rem;
    }
    .template-canvas .pre-body {
      font-size: 0.66rem;
      line-height: 1.55;
      color: var(--text);
      opacity: 0.85;
      max-height: 12em;
      overflow: hidden;
      mask-image: linear-gradient(to bottom, #000 70%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, #000 70%, transparent);
    }
    .template-canvas .pre-body :where(p, h1, h2, ul, blockquote) {
      margin-bottom: 0.6em;
    }
    .template-canvas .pre-body h1 {
      font-size: 0.9rem;
      color: var(--accent-strong);
      font-weight: 300;
    }
    .template-canvas .pre-body h2 {
      font-size: 0.78rem;
      color: var(--accent-deep);
      font-style: italic;
      font-weight: 300;
    }
    .template-canvas .pre-body blockquote {
      border-left: 1.5px solid var(--accent);
      padding-left: 0.8em;
      font-style: italic;
      color: var(--muted);
    }
    .template-canvas .pre-body ul { padding-left: 1em; }

    .template-meta {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 0.9rem 1.1rem;
      background: linear-gradient(to top, var(--surface) 70%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      z-index: 2;
    }
    .template-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-style: italic;
      font-weight: 300;
      color: var(--accent-strong);
    }
    .template-desc {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.7;
    }
    .template-tokens {
      position: absolute;
      top: 0.9rem;
      right: 0.9rem;
      display: flex;
      gap: 0.3rem;
      z-index: 2;
    }
    .template-token-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid var(--rule);
    }

    .footnote {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-align: center;
      margin-top: 4rem;
      opacity: 0.55;
    }
  </style>
</head>
<body class="motif-blobs">

  <div class="motif-grain"></div>
  <div class="motif-blob motif-blob-1"></div>
  <div class="motif-blob motif-blob-2"></div>
  <div class="motif-blob motif-blob-3"></div>
  <div class="motif-blob motif-blob-4"></div>

  <header class="topbar">
    <a href="/" class="topbar-brand">.space</a>
    <span class="topbar-label">scaffold</span>
    <div class="topbar-shimmer motif-shimmer-line"></div>
  </header>

  <div class="page-wrap">
    <p class="page-eyebrow">starting points</p>
    <h1 class="page-title">scaffold</h1>
    <p class="page-sub">six templates · click one to open in <code>/write</code></p>

    <div class="template-grid" id="template-grid"></div>

    <p class="footnote">defined in <code>shared/library.js</code> · combine palette + motif + font + sample</p>
  </div>

  <script type="module">
    import { templates, findFont } from '/shared/library.js';

    const grid = document.getElementById('template-grid');
    grid.innerHTML = templates.map(t => {
      const font = findFont(t.font);
      const fontStyle = 'font-family:' + font.body + ';';
      const displayStyle = 'font-family:' + font.display + ';';
      return '<a class="template-tile" href="/write?template=' + t.id + '" data-theme="' + t.palette + '">' +
        '<div class="template-canvas">' +
          '<div class="template-tokens">' +
            '<span class="template-token-dot" style="background:var(--lavender)"></span>' +
            '<span class="template-token-dot" style="background:var(--aqua)"></span>' +
            '<span class="template-token-dot" style="background:var(--peach)"></span>' +
          '</div>' +
          '<p class="pre-title">' + t.palette + ' · ' + t.motif + ' · ' + t.font + '</p>' +
          '<h3 class="pre-h1" style="' + displayStyle + '">' + t.sampleTitle + '</h3>' +
          '<div class="pre-body" style="' + fontStyle + '">' + t.sampleContent + '</div>' +
        '</div>' +
        '<div class="template-meta">' +
          '<span class="template-name" style="' + displayStyle + '">' + t.name + '</span>' +
          '<span class="template-desc">' + t.desc + '</span>' +
        '</div>' +
      '</a>';
    }).join('');
  </script>

</body>
</html>
