<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>echoes · woodles.space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/shared/fonts.css" />
  <link rel="stylesheet" href="/shared/palette.css" />
  <link rel="stylesheet" href="/shared/motifs.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--letter-mono, var(--font-mono));
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 1.6rem;
      background: var(--surface);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
    }
    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--lavender) 20%, var(--aqua) 45%, var(--peach) 65%, var(--lilac) 80%, transparent 100%);
      background-size: 220% 100%;
      animation: bar-shimmer 11s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes bar-shimmer {
      0% { background-position: 0% 0; }
      50% { background-position: 100% 0; }
      100% { background-position: 0% 0; }
    }
    .topbar-brand {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-decoration: none;
      position: relative;
      z-index: 1;
      color: var(--muted);
    }
    .topbar-brand:hover { color: var(--accent-strong); }
    .topbar-label {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.45;
      margin-left: 1.2rem;
      position: relative;
      z-index: 1;
    }
    .topbar-clock {
      margin-left: auto;
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.60rem;
      letter-spacing: 0.10em;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      position: relative;
      z-index: 1;
    }
    .clock-date { color: var(--muted); opacity: 0.7; }
    .clock-sep  { color: var(--accent); opacity: 0.9; }
    .clock-time { color: var(--text); opacity: 0.8; }
    .clock-time.tick { animation: tick-fade 0.45s ease; }
    @keyframes tick-fade {
      0%  { opacity: 0.8; }
      20% { opacity: 0.3; }
      100%{ opacity: 0.8; }
    }

    /* ── letter layout ── */
    .letter-wrap {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      padding: 88px clamp(1.5rem, 5vw, 2.5rem) 8rem;
      opacity: 0;
      animation: motif-rise 1s ease forwards 0.1s;
    }

    .letter-header { margin-bottom: 3rem; }
    .letter-pub {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
      margin-bottom: 1.4rem;
    }
    .letter-title {
      font-family: var(--letter-display, var(--font-display));
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      line-height: 1.08;
      margin-bottom: 1.8rem;
    }
    .letter-divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender), var(--aqua), transparent);
    }

    .letter-body {
      font-family: var(--letter-body, var(--font-body));
      font-size: 1.08rem;
      line-height: 1.92;
      color: var(--text);
      margin-top: 2.8rem;
    }
    .letter-body h1 {
      font-family: var(--letter-display, var(--font-display));
      font-size: 2rem;
      font-weight: 300;
      color: var(--accent-strong);
      line-height: 1.15;
      margin: 2em 0 0.5em;
    }
    .letter-body h2 {
      font-family: var(--letter-display, var(--font-display));
      font-size: 1.35rem;
      font-weight: 300;
      font-style: italic;
      color: var(--accent-deep);
      line-height: 1.2;
      margin: 1.6em 0 0.4em;
    }
    .letter-body p { margin-bottom: 1.1em; }
    .letter-body p:last-child { margin-bottom: 0; }
    .letter-body blockquote {
      border-left: 2px solid var(--accent);
      padding: 0.1em 0 0.1em 1.3em;
      margin: 1.5em 0;
      font-style: italic;
      color: var(--muted);
    }
    .letter-body ul, .letter-body ol { padding-left: 1.5em; margin: 0.9em 0; }
    .letter-body li { margin-bottom: 0.25em; }
    .letter-body a { color: var(--accent-strong); text-decoration: none; border-bottom: 1px solid var(--rule); }
    .letter-body a:hover { border-bottom-color: var(--accent-strong); }
    .letter-body strong { font-weight: 600; }
    .letter-body em { font-style: italic; }

    .letter-footer {
      margin-top: 5rem;
      padding-top: 1.8rem;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .letter-sig {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.45;
    }
    .edit-link {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: color 0.15s ease, border-color 0.15s ease;
      opacity: 0.5;
    }
    .edit-link:hover { color: var(--accent-strong); border-color: var(--accent); opacity: 1; }

    .empty-state { text-align: center; padding-top: 6rem; }
    .empty-title {
      font-family: var(--letter-display, var(--font-display));
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      opacity: 0.4;
      margin-bottom: 1.2rem;
    }
    .empty-sub {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.60rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.4;
      margin-bottom: 2rem;
    }
    .write-link {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent-strong);
      text-decoration: none;
      padding: 8px 24px;
      border-radius: 100px;
      transition: background 0.2s ease;
    }
    .write-link:hover { background: var(--accent-deep); }
  </style>
</head>
<body>

  <div class="motif-grain"></div>
  <div class="motif-blob motif-blob-1"></div>
  <div class="motif-blob motif-blob-2"></div>
  <div class="motif-blob motif-blob-3"></div>
  <div class="motif-blob motif-blob-4"></div>

  <header class="topbar">
    <a href="/" class="topbar-brand">.space</a>
    <span class="topbar-label">echoes</span>
    <div class="topbar-clock">
      <span class="clock-date" id="clock-date"></span>
      <span class="clock-sep">·</span>
      <span class="clock-time" id="clock-time"></span>
    </div>
  </header>

  <div class="letter-wrap" id="letter-wrap"></div>

  <script type="module">
    import { findFont, findPalette, findMotif } from '/shared/library.js';

    /* ── clock ── */
    const DAYS   = ['sun','mon','tue','wed','thu','fri','sat'];
    const MONTHS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const dateEl = document.getElementById('clock-date');
    const timeEl = document.getElementById('clock-time');
    function pad(n) { return String(n).padStart(2,'0'); }
    function tick() {
      const now = new Date();
      dateEl.textContent = DAYS[now.getDay()] + ' ' + pad(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
      const t = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
      if (timeEl.textContent !== t) {
        timeEl.classList.remove('tick'); void timeEl.offsetWidth; timeEl.classList.add('tick');
        timeEl.textContent = t;
      }
    }
    tick(); setInterval(tick, 1000);

    /* ── apply theme/motif/font tokens to body ── */
    function applyTokens(letter) {
      const palette = findPalette(letter && letter.theme);
      const motif = findMotif(letter && letter.motif);
      const font = findFont(letter && letter.font);
      document.body.dataset.theme = palette.id;
      document.body.classList.add('motif-' + motif.id);
      document.body.style.setProperty('--letter-display', font.display);
      document.body.style.setProperty('--letter-body', font.body);
      document.body.style.setProperty('--letter-mono', font.mono);
    }

    /* ── render letter ── */
    const wrap = document.getElementById('letter-wrap');

    function formatDate(iso) {
      const d = new Date(iso);
      return DAYS[d.getDay()] + ' ' + pad(d.getDate()) + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    }
    function formatIssue(n) {
      return '№ ' + String(n).padStart(3, '0');
    }
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    try {
      const raw = localStorage.getItem('woodles_published');
      if (!raw) throw new Error('empty');
      const letter = JSON.parse(raw);
      applyTokens(letter);

      wrap.innerHTML =
        '<div class="letter-header">' +
          '<p class="letter-pub">echoes &nbsp;·&nbsp; ' + formatIssue(letter.issue || 1) + ' &nbsp;·&nbsp; ' + formatDate(letter.publishedAt) + '</p>' +
          '<h1 class="letter-title">' + escapeHtml(letter.title) + '</h1>' +
          '<div class="letter-divider"></div>' +
        '</div>' +
        '<div class="letter-body">' + letter.content + '</div>' +
        '<footer class="letter-footer">' +
          '<span class="letter-sig">woodles.space &nbsp;·&nbsp; echoes</span>' +
          '<a href="/write" class="edit-link">edit →</a>' +
        '</footer>';

    } catch(e) {
      applyTokens(null);
      wrap.innerHTML =
        '<div class="empty-state">' +
          '<p class="empty-title">nothing here yet.</p>' +
          '<p class="empty-sub">write your first letter</p>' +
          '<a href="/write" class="write-link">write →</a>' +
        '</div>';
    }
  </script>

</body>
</html>
