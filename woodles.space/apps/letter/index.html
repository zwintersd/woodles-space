<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>echoes · woodles.space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/shared/fonts.css" />
  <link rel="stylesheet" href="/shared/palette.css" />
  <link rel="stylesheet" href="/shared/motifs.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--letter-mono, var(--font-mono));
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 1.6rem;
      background: var(--surface);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
    }
    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--lavender) 20%, var(--aqua) 45%, var(--peach) 65%, var(--lilac) 80%, transparent 100%);
      background-size: 220% 100%;
      animation: bar-shimmer 11s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes bar-shimmer {
      0% { background-position: 0% 0; }
      50% { background-position: 100% 0; }
      100% { background-position: 0% 0; }
    }
    .topbar-brand {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-decoration: none;
      position: relative;
      z-index: 1;
      color: var(--muted);
    }
    .topbar-brand:hover { color: var(--accent-strong); }
    .topbar-label {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.45;
      margin-left: 1.2rem;
      position: relative;
      z-index: 1;
    }
    .topbar-clock {
      margin-left: auto;
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.60rem;
      letter-spacing: 0.10em;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      position: relative;
      z-index: 1;
    }
    .clock-date { color: var(--muted); opacity: 0.7; }
    .clock-sep  { color: var(--accent); opacity: 0.9; }
    .clock-time { color: var(--text); opacity: 0.8; }
    .clock-time.tick { animation: tick-fade 0.45s ease; }
    @keyframes tick-fade {
      0%  { opacity: 0.8; }
      20% { opacity: 0.3; }
      100%{ opacity: 0.8; }
    }

    /* ── letter layout ── */
    .letter-wrap {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      padding: 88px clamp(1.5rem, 5vw, 2.5rem) 8rem;
      opacity: 0;
      animation: motif-rise 1s ease forwards 0.1s;
    }

    .letter-header { margin-bottom: 3rem; }
    .letter-pub {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
      margin-bottom: 1.4rem;
    }
    .letter-title {
      font-family: var(--letter-display, var(--font-display));
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      line-height: 1.08;
      margin-bottom: 1.8rem;
    }
    .letter-divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender), var(--aqua), transparent);
    }

    .letter-body {
      font-family: var(--letter-body, var(--font-body));
      font-size: 1.08rem;
      line-height: 1.92;
      color: var(--text);
      margin-top: 2.8rem;
    }
    /* Force inheritance over any leftover inline font-family from
     * pasted/imported content. The viewer also sanitizes HTML on render
     * (sanitizeHtml below) — this rule is a defensive belt. */
    .letter-body * { font-family: inherit; }
    .letter-body h1, .letter-body h2, .letter-body h3 {
      font-family: var(--letter-display, var(--font-display));
    }

    /* ── layers ── */
    .layer { transition: opacity 0.4s ease; }
    .layer[hidden] { display: none; }
    .layer-eyebrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
      margin-top: 3.4rem;
      margin-bottom: 0.9rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--rule);
    }
    .layer-midground {
      font-size: 0.97rem;
      line-height: 1.78;
      color: var(--muted);
      max-width: 88%;
      margin-left: 6%;
    }
    .layer-background {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--muted);
      opacity: 0.78;
      font-style: italic;
      max-width: 78%;
      margin-left: 12%;
    }
    .layer-midground :global(h1), .layer-midground h1,
    .layer-midground :global(h2), .layer-midground h2,
    .layer-background h1, .layer-background h2 {
      font-size: 1.05rem;
      font-style: italic;
      color: var(--accent-deep);
      margin: 1.2em 0 0.3em;
    }

    /* ── topbar layer toggles ── */
    .layer-toggles {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: 1.4rem;
      position: relative;
      z-index: 1;
    }
    .layer-tog {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      background: none;
      border: 1px solid transparent;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.4;
      transition: color 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
    }
    .layer-tog:hover { opacity: 0.85; color: var(--accent-strong); }
    .layer-tog.on {
      color: var(--accent-strong);
      opacity: 1;
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .topbar-divider {
      display: inline-block;
      width: 1px;
      height: 14px;
      background: var(--rule);
      margin: 0 0.9rem;
      opacity: 0.6;
      position: relative;
      z-index: 1;
    }
    .topbar-divider[hidden] { display: none; }
    .pockets-tog {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      background: none;
      border: 1px solid transparent;
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.5;
      display: inline-flex;
      align-items: center;
      gap: 0.45em;
      position: relative;
      z-index: 1;
      transition: color 0.22s ease, background 0.22s ease, border-color 0.22s ease, opacity 0.22s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pockets-tog:hover { opacity: 0.9; color: var(--accent-strong); }
    .pockets-tog.on {
      color: var(--accent-strong);
      opacity: 1;
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      transform: translateY(-1px);
    }
    .pockets-tog[hidden] { display: none; }
    .pockets-tog-count {
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent-strong);
      opacity: 0.85;
    }

    /* ── pockets (inside cover) ── */
    .pockets-section {
      margin-top: 3.6rem;
      animation: pocket-rise 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pockets-section[hidden] { display: none; }
    @keyframes pocket-rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pockets-divider {
      height: 1px;
      width: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--rule) 18%,
        color-mix(in srgb, var(--accent) 35%, transparent) 50%,
        var(--rule) 82%,
        transparent 100%
      );
      opacity: 0.7;
      margin-bottom: 1.4rem;
    }
    .pockets-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .pockets-eyebrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
    }
    .pockets-order {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      background: none;
      border: 1px dashed transparent;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.55;
      transition: color 0.18s ease, border-color 0.18s ease, opacity 0.18s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pockets-order:hover {
      opacity: 0.95;
      color: var(--accent-strong);
      border-color: color-mix(in srgb, var(--accent) 35%, transparent);
      transform: translateY(-1px);
    }
    .pockets-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .pocket-card-readonly {
      position: relative;
      padding: 0.95rem 1.2rem;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 55%, transparent);
    }
    .pocket-card-readonly.is-background {
      background: color-mix(in srgb, var(--surface) 35%, transparent);
      border-style: dashed;
      opacity: 0.92;
    }
    .pocket-layer-chip {
      position: absolute;
      top: 0.5rem;
      left: 0.55rem;
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      padding: 1px 5px;
      border-radius: 6px;
      opacity: 0.6;
      pointer-events: none;
    }
    .pocket-card-readonly.is-background .pocket-layer-chip {
      color: var(--accent-deep);
      opacity: 0.7;
    }
    .pocket-card-readonly .pocket-body {
      font-family: var(--letter-body, var(--font-body));
      font-size: 0.96rem;
      line-height: 1.65;
      color: var(--text);
      margin-top: 0.6rem;
    }
    .pocket-card-readonly .pocket-body * { font-family: var(--letter-body, var(--font-body)); }
    .pocket-card-readonly.is-background .pocket-body {
      font-style: italic;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .pocket-card-readonly .pocket-body strong { font-weight: 600; }
    .pocket-card-readonly .pocket-body em { font-style: italic; }
    .pocket-card-readonly .pocket-body p { margin-bottom: 0.6em; }
    .pocket-card-readonly .pocket-body p:last-child { margin-bottom: 0; }

    /* ── margin notes (right-margin annotations on fg passages) ── */
    .letter-page {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 2.4rem;
    }
    .margin-column {
      position: relative;
      width: 280px;
      flex-shrink: 0;
      padding-top: 88px;
      padding-bottom: 8rem;
      min-height: 100vh;
    }
    .margin-column.hidden { visibility: hidden; }
    .margin-group {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      transition: top 0.18s ease;
    }
    .margin-note-readonly {
      position: relative;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
    }
    .margin-anchor-ref {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.48rem;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--muted);
      opacity: 0.45;
      display: block;
      margin-bottom: 0.35rem;
    }
    .margin-note-readonly .margin-body {
      font-family: var(--letter-body, var(--font-body));
      font-size: 0.86rem;
      line-height: 1.55;
      color: var(--muted);
      font-style: italic;
    }
    .margin-note-readonly .margin-body * { font-family: var(--letter-body, var(--font-body)); }
    .margin-note-readonly .margin-body strong { font-weight: 600; font-style: italic; }
    .margin-note-readonly .margin-body em { font-style: normal; }
    .margin-note-readonly .margin-body p { margin-bottom: 0.4em; }
    .margin-note-readonly .margin-body p:last-child { margin-bottom: 0; }

    @media (max-width: 1100px) {
      .letter-page {
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .margin-column {
        width: 100%;
        max-width: 640px;
        min-height: 0;
        padding-top: 0;
        padding-bottom: 1rem;
      }
      .margin-column.hidden { display: none; visibility: visible; }
      .margin-group {
        position: static;
        margin: 0 clamp(1.5rem, 5vw, 2.5rem) 0.6rem;
      }
    }

    /* ── binder ── */
    .binder-tabs {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 30;
    }
    .binder-tab {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      padding: 12px 6px;
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--muted);
      background: var(--surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--rule);
      border-right: none;
      border-radius: 6px 0 0 6px;
      cursor: pointer;
      opacity: 0.75;
      transition: color 0.22s ease, background 0.22s ease, border-color 0.22s ease, opacity 0.22s ease, padding-right 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .binder-tab:hover { opacity: 1; color: var(--accent-strong); }
    .binder-tab.active {
      color: var(--accent-strong);
      opacity: 1;
      background: color-mix(in srgb, var(--accent) 22%, var(--surface) 78%);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      padding-right: 10px;
    }

    .binder-panel {
      position: fixed;
      top: 42px;
      bottom: 0;
      right: 32px;
      width: min(360px, calc(100vw - 64px));
      background: var(--surface);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-left: 1px solid var(--rule);
      z-index: 25;
      display: flex;
      flex-direction: column;
      transform: translateX(calc(100% + 32px));
      transition: transform 0.34s cubic-bezier(0.34, 1.36, 0.64, 1), box-shadow 0.34s ease;
      box-shadow: none;
    }
    .binder-panel.open {
      transform: translateX(0);
      box-shadow: -10px 0 36px color-mix(in srgb, var(--accent-deep) 16%, transparent);
    }
    .binder-header {
      padding: 1.1rem 1.2rem 0.75rem;
      border-bottom: 1px solid var(--rule);
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .binder-header-eyebrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.5rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted); opacity: 0.55;
    }
    .binder-header-title {
      font-family: var(--letter-display, var(--font-display));
      font-size: 1.25rem; font-weight: 300; font-style: italic;
      color: var(--accent-strong);
    }
    .binder-controls {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.75rem; padding: 0.7rem 1.2rem 0.6rem;
      border-bottom: 1px solid var(--rule);
    }
    .binder-filter { display: inline-flex; gap: 2px; }
    .binder-filter-btn {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.52rem; letter-spacing: 0.14em;
      text-transform: lowercase; color: var(--muted);
      background: none; border: 1px solid transparent;
      padding: 3px 8px; border-radius: 4px; cursor: pointer;
      opacity: 0.55;
      transition: color 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
    }
    .binder-filter-btn:hover { opacity: 0.95; color: var(--accent-strong); }
    .binder-filter-btn.active {
      color: var(--accent-strong); opacity: 1;
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    }
    .binder-sort {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.52rem; letter-spacing: 0.14em;
      text-transform: lowercase; color: var(--muted);
      background: none; border: 1px dashed transparent;
      padding: 3px 8px; border-radius: 4px; cursor: pointer;
      opacity: 0.6;
      transition: color 0.18s ease, border-color 0.18s ease, opacity 0.18s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .binder-sort:hover {
      opacity: 0.95; color: var(--accent-strong);
      border-color: color-mix(in srgb, var(--accent) 35%, transparent);
      transform: translateY(-1px);
    }
    .binder-body {
      flex: 1; overflow-y: auto;
      padding: 0.7rem 1.2rem 1.4rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .binder-empty {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.6rem; letter-spacing: 0.1em;
      color: var(--muted); opacity: 0.4;
      font-style: italic;
      padding: 1rem 0.4rem; text-align: center;
    }
    .binder-row {
      display: flex; flex-direction: column; gap: 0.35rem;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: color-mix(in srgb, var(--surface) 30%, transparent);
      text-align: left; cursor: pointer;
      width: 100%;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: var(--letter-mono, var(--font-mono));
    }
    .binder-row:hover {
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      background: color-mix(in srgb, var(--surface) 70%, transparent);
      transform: translateY(-1px);
    }
    .binder-row.active {
      border-color: color-mix(in srgb, var(--accent) 60%, transparent);
      background: color-mix(in srgb, var(--accent) 12%, var(--surface) 88%);
    }
    .binder-row-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 0.5rem;
    }
    .binder-row-name {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.6rem; letter-spacing: 0.16em;
      text-transform: lowercase; color: var(--accent-strong);
    }
    .binder-row-meta {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.5rem; letter-spacing: 0.1em;
      color: var(--muted); opacity: 0.6;
    }
    .binder-row-preview {
      font-family: var(--letter-body, var(--font-body));
      font-size: 0.78rem; line-height: 1.45;
      color: var(--muted); font-style: italic;
    }
    .binder-row-preview.dim { opacity: 0.4; }
    .binder-row-passage {
      font-family: var(--letter-body, var(--font-body));
      font-size: 0.74rem; line-height: 1.4;
      color: var(--text); opacity: 0.85;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .binder-chip {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.5rem; letter-spacing: 0.16em;
      text-transform: lowercase; color: var(--muted);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      padding: 1px 5px; border-radius: 6px;
      opacity: 0.7;
    }
    .binder-chip-anchor { color: var(--accent-deep); }
    .binder-chip-on {
      background: color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent-strong);
      opacity: 1;
    }
    .binder-source-chip {
      font-family: var(--letter-display, var(--font-display));
      font-style: italic;
      font-size: 0.65rem;
      letter-spacing: 0;
      text-transform: none;
      color: var(--accent-strong);
      opacity: 0.75;
      max-width: 14em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 1px 0;
    }
    .pocket-row-background { border-style: dashed; }
    .pocket-row-background .binder-row-preview { opacity: 0.7; }

    /* anchor flash */
    .letter-body .anchor-flash {
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      transition: background 1.2s ease;
      border-radius: 3px;
    }

    @media (max-width: 700px) {
      .binder-panel { right: 28px; width: calc(100vw - 56px); }
    }
    .letter-body h1 {
      font-family: var(--letter-display, var(--font-display));
      font-size: 2rem;
      font-weight: 300;
      color: var(--accent-strong);
      line-height: 1.15;
      margin: 2em 0 0.5em;
    }
    .letter-body h2 {
      font-family: var(--letter-display, var(--font-display));
      font-size: 1.35rem;
      font-weight: 300;
      font-style: italic;
      color: var(--accent-deep);
      line-height: 1.2;
      margin: 1.6em 0 0.4em;
    }
    .letter-body p { margin-bottom: 1.1em; }
    .letter-body p:last-child { margin-bottom: 0; }
    .letter-body blockquote {
      border-left: 2px solid var(--accent);
      padding: 0.1em 0 0.1em 1.3em;
      margin: 1.5em 0;
      font-style: italic;
      color: var(--muted);
    }
    .letter-body ul, .letter-body ol { padding-left: 1.5em; margin: 0.9em 0; }
    .letter-body li { margin-bottom: 0.25em; }
    .letter-body a { color: var(--accent-strong); text-decoration: none; border-bottom: 1px solid var(--rule); }
    .letter-body a:hover { border-bottom-color: var(--accent-strong); }
    .letter-body strong { font-weight: 600; }
    .letter-body em { font-style: italic; }

    /* ── reply breadcrumb (top of response letters) ── */
    .reply-breadcrumb {
      display: inline-flex;
      align-items: baseline;
      gap: 0.65rem;
      margin-bottom: 1.4rem;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 100px;
      border: 1px solid var(--rule);
      background: color-mix(in srgb, var(--surface) 40%, transparent);
      transition: opacity 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .reply-breadcrumb:hover {
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      transform: translateY(-1px);
    }
    .reply-breadcrumb-eyebrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
    }
    .reply-breadcrumb-title {
      font-family: var(--letter-display, var(--font-display));
      font-style: italic;
      color: var(--accent-strong);
      font-size: 0.95rem;
      max-width: 22em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .reply-breadcrumb-arrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.7rem;
      color: var(--accent-strong);
      opacity: 0.7;
    }

    /* ── responses section (bottom of letter) ── */
    .responses-section {
      margin-top: 4rem;
    }
    .responses-divider {
      height: 1px;
      width: 100%;
      background: linear-gradient(90deg, transparent 0%, var(--rule) 18%,
        color-mix(in srgb, var(--accent) 30%, transparent) 50%,
        var(--rule) 82%, transparent 100%);
      opacity: 0.65;
      margin-bottom: 1.4rem;
    }
    .responses-eyebrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
      display: block;
      margin-bottom: 1.2rem;
    }
    .responses-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .response-card {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      padding: 1rem 1.2rem;
      border: 1px solid var(--rule);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 45%, transparent);
      text-decoration: none;
      transition: border-color 0.22s ease, background 0.22s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.32s ease;
    }
    .response-card:hover {
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
      background: color-mix(in srgb, var(--accent) 8%, var(--surface) 92%);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px color-mix(in srgb, var(--accent-deep) 12%, transparent);
    }
    .response-card-meta {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.52rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
      display: flex;
      gap: 0.6rem;
    }
    .response-card-title {
      font-family: var(--letter-display, var(--font-display));
      font-weight: 300;
      font-style: italic;
      font-size: 1.35rem;
      color: var(--accent-strong);
      line-height: 1.18;
    }
    .response-card-snippet {
      font-family: var(--letter-body, var(--font-body));
      font-size: 0.92rem;
      line-height: 1.55;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── respond cta ── */
    .respond-cta-wrap {
      margin-top: 2.4rem;
      display: flex;
      justify-content: center;
    }
    .respond-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75em;
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--bg);
      background: var(--accent-strong);
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 100px;
      transition: background 0.22s ease, transform 0.22s ease, box-shadow 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .respond-cta:hover {
      background: var(--accent-deep);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px color-mix(in srgb, var(--accent-deep) 30%, transparent);
    }
    .respond-cta-arrow { font-size: 0.85rem; line-height: 1; }

    .letter-footer {
      margin-top: 5rem;
      padding-top: 1.8rem;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .letter-sig {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.45;
    }
    .edit-link {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: color 0.15s ease, border-color 0.15s ease;
      opacity: 0.5;
    }
    .edit-link:hover { color: var(--accent-strong); border-color: var(--accent); opacity: 1; }

    .empty-state { text-align: center; padding-top: 6rem; }
    .empty-title {
      font-family: var(--letter-display, var(--font-display));
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      opacity: 0.4;
      margin-bottom: 1.2rem;
    }
    .empty-sub {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.60rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.4;
      margin-bottom: 2rem;
    }
    .write-link {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent-strong);
      text-decoration: none;
      padding: 8px 24px;
      border-radius: 100px;
      transition: background 0.2s ease;
    }
    .write-link:hover { background: var(--accent-deep); }
  </style>
</head>
<body>

  <div class="motif-grain"></div>
  <div class="motif-blob motif-blob-1"></div>
  <div class="motif-blob motif-blob-2"></div>
  <div class="motif-blob motif-blob-3"></div>
  <div class="motif-blob motif-blob-4"></div>

  <header class="topbar">
    <a href="/" class="topbar-brand">.space</a>
    <span class="topbar-label">echoes</span>
    <div class="layer-toggles" id="layer-toggles" role="group" aria-label="layers"></div>
    <div class="topbar-clock">
      <span class="clock-date" id="clock-date"></span>
      <span class="clock-sep">·</span>
      <span class="clock-time" id="clock-time"></span>
    </div>
  </header>

  <div class="letter-page">
    <div class="letter-wrap" id="letter-wrap"></div>
    <aside class="margin-column" id="margin-column" aria-label="margin notes"></aside>
  </div>

  <div class="binder-tabs" role="tablist" aria-label="binder">
    <button class="binder-tab" id="binder-tab-layers" role="tab" data-tab="layers" type="button">layers</button>
    <button class="binder-tab" id="binder-tab-pockets" role="tab" data-tab="pockets" type="button">pockets</button>
    <button class="binder-tab" id="binder-tab-notes" role="tab" data-tab="notes" type="button">notes</button>
  </div>
  <aside class="binder-panel" id="binder-panel" role="region" aria-hidden="true"></aside>

  <script type="module">
    import { findFont, findPalette, findMotif } from '/shared/library.js';

    /* ── clock ── */
    const DAYS   = ['sun','mon','tue','wed','thu','fri','sat'];
    const MONTHS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const dateEl = document.getElementById('clock-date');
    const timeEl = document.getElementById('clock-time');
    function pad(n) { return String(n).padStart(2,'0'); }
    function tick() {
      const now = new Date();
      dateEl.textContent = DAYS[now.getDay()] + ' ' + pad(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
      const t = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
      if (timeEl.textContent !== t) {
        timeEl.classList.remove('tick'); void timeEl.offsetWidth; timeEl.classList.add('tick');
        timeEl.textContent = t;
      }
    }
    tick(); setInterval(tick, 1000);

    /* ── apply theme/motif/font tokens to body ── */
    function applyTokens(letter) {
      const palette = findPalette(letter && letter.theme);
      const motif = findMotif(letter && letter.motif);
      const font = findFont(letter && letter.font);
      document.body.dataset.theme = palette.id;
      document.body.classList.add('motif-' + motif.id);
      document.body.style.setProperty('--letter-display', font.display);
      document.body.style.setProperty('--letter-body', font.body);
      document.body.style.setProperty('--letter-mono', font.mono);
    }

    /* ── render letter ── */
    const wrap = document.getElementById('letter-wrap');

    function formatDate(iso) {
      const d = new Date(iso);
      return DAYS[d.getDay()] + ' ' + pad(d.getDate()) + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    }
    function formatIssue(n) {
      return '№ ' + String(n).padStart(3, '0');
    }
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── multi-doc storage ── */
    const LETTERS_KEY = 'woodles_letters';
    const LEGACY_PUBLISHED_KEY = 'woodles_published';

    function newLetterId() {
      return 'l-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
    }

    function loadLettersList() {
      try {
        const raw = localStorage.getItem(LETTERS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        }
        // Migration from legacy single-letter slot.
        const old = localStorage.getItem(LEGACY_PUBLISHED_KEY);
        if (old) {
          const lt = JSON.parse(old);
          lt.id = lt.id || newLetterId();
          lt.replyTo = lt.replyTo == null ? null : lt.replyTo;
          const list = [lt];
          localStorage.setItem(LETTERS_KEY, JSON.stringify(list));
          return list;
        }
      } catch (e) { /* ignore */ }
      return [];
    }
    function findLetterInList(list, id) {
      return list.find(function (l) { return l.id === id; });
    }
    function pickLetter(list, requestedId) {
      if (list.length === 0) return null;
      if (requestedId) {
        const found = findLetterInList(list, requestedId);
        if (found) return found;
      }
      // Default: most-recently published.
      return list.slice().sort(function (a, b) {
        return String(b.publishedAt || '').localeCompare(String(a.publishedAt || ''));
      })[0];
    }

    /* ── layer visibility ── */
    const VIS_KEY = 'woodles_layer_visibility';
    const POCKETS_ORDER_KEY = 'woodles_pockets_order';
    const LAYER_IDS = ['foreground', 'midground', 'background'];
    const LAYER_LABELS = { foreground: 'fg', midground: 'mg', background: 'bg' };
    const DEFAULT_VIS = { foreground: true, midground: false, background: false };

    function loadVisibility() {
      try {
        const raw = localStorage.getItem(VIS_KEY);
        if (!raw) return { ...DEFAULT_VIS };
        const v = JSON.parse(raw);
        return {
          foreground: v.foreground !== false, // default on
          midground: !!v.midground,
          background: !!v.background
        };
      } catch (e) {
        return { ...DEFAULT_VIS };
      }
    }
    function saveVisibility(v) {
      try { localStorage.setItem(VIS_KEY, JSON.stringify(v)); } catch (e) {}
    }

    function loadPocketsOrder() {
      try {
        const o = localStorage.getItem(POCKETS_ORDER_KEY);
        return (o === 'newest' || o === 'oldest') ? o : 'oldest';
      } catch (e) { return 'oldest'; }
    }
    function savePocketsOrder(o) {
      try { localStorage.setItem(POCKETS_ORDER_KEY, o); } catch (e) {}
    }

    /* ── sanitize: strip inline font-family and other style carriers
     * from rendered HTML so the document's font system always wins. */
    function sanitizeHtml(html) {
      if (typeof DOMParser === 'undefined' || !html) return html || '';
      const doc = new DOMParser().parseFromString('<div id="__r">' + html + '</div>', 'text/html');
      const root = doc.getElementById('__r');
      if (!root) return html;
      root.querySelectorAll('*').forEach((el) => {
        el.removeAttribute('style');
        el.removeAttribute('color');
        el.removeAttribute('face');
        el.removeAttribute('size');
        el.removeAttribute('bgcolor');
        if (el.tagName === 'FONT' || el.tagName === 'SPAN') {
          const parent = el.parentNode;
          if (!parent) return;
          while (el.firstChild) parent.insertBefore(el.firstChild, el);
          parent.removeChild(el);
        }
      });
      return root.innerHTML;
    }

    function getLayers(letter) {
      // Migration: synthesize layers from legacy `content` if missing.
      // Sanitize on read so old letters with inline font styles render
      // with the document's chosen font.
      const L = letter.layers || {};
      return {
        foreground: { html: sanitizeHtml((L.foreground && L.foreground.html) || letter.content || '') },
        midground:  { html: sanitizeHtml((L.midground  && L.midground.html)  || '') },
        background: { html: sanitizeHtml((L.background && L.background.html) || '') }
      };
    }

    function isEmptyHtml(html) {
      return String(html || '').replace(/<br\s*\/?>(\s*)/gi, '').replace(/<[^>]+>/g, '').trim().length === 0;
    }

    function renderLayers(letter, visibility) {
      const layers = getLayers(letter);
      let html = '';
      LAYER_IDS.forEach((id) => {
        const layerHtml = layers[id].html;
        if (isEmptyHtml(layerHtml)) return;
        const visible = !!visibility[id];
        const eyebrow = id === 'foreground'
          ? ''
          : '<p class="layer-eyebrow">' + id + '</p>';
        html +=
          '<section class="layer letter-body layer-' + id + '"' + (visible ? '' : ' hidden') + ' data-layer="' + id + '">' +
            eyebrow +
            layerHtml +
          '</section>';
      });
      return html;
    }

    function renderToggles(letter, visibility, onToggle) {
      const layers = getLayers(letter);
      const togglesEl = document.getElementById('layer-toggles');
      togglesEl.innerHTML = '';
      LAYER_IDS.forEach((id) => {
        const empty = isEmptyHtml(layers[id].html);
        const btn = document.createElement('button');
        btn.className = 'layer-tog' + (visibility[id] ? ' on' : '');
        btn.type = 'button';
        btn.textContent = LAYER_LABELS[id];
        btn.title = empty ? id + ' (empty)' : id;
        btn.setAttribute('aria-pressed', visibility[id] ? 'true' : 'false');
        if (empty) { btn.style.opacity = '0.2'; btn.style.cursor = 'default'; }
        else btn.addEventListener('click', () => onToggle(id));
        togglesEl.appendChild(btn);
      });
    }

    function getMarginNotes(letter) {
      const notes = letter && letter.annotations && letter.annotations.marginNotes;
      if (!Array.isArray(notes)) return [];
      return notes.map((n) => ({ ...n, html: sanitizeHtml(n.html || '') }));
    }
    function getPocketNotes(letter) {
      const notes = letter && letter.annotations && letter.annotations.pocketNotes;
      if (!Array.isArray(notes)) return [];
      // Normalize: ensure each note has a layer (default mg) and clean html.
      return notes.map((n) => ({
        ...n,
        layer: n.layer === 'background' ? 'background' : 'midground',
        html: sanitizeHtml(n.html || '')
      }));
    }
    function sortPockets(notes, order) {
      return [...notes].sort((a, b) =>
        order === 'oldest'
          ? String(a.createdAt || '').localeCompare(String(b.createdAt || ''))
          : String(b.createdAt || '').localeCompare(String(a.createdAt || ''))
      );
    }
    function pocketsOrderLabel(order) {
      return order === 'oldest' ? 'oldest first ↓' : 'newest first ↑';
    }
    function pocketLayerShort(layer) {
      return layer === 'background' ? 'bg' : 'mg';
    }
    function renderPockets(letter, visibility, order) {
      const allNotes = getPocketNotes(letter);
      // Filter notes by their layer's visibility (per-note coupling).
      const notes = allNotes.filter((n) => visibility[n.layer]);
      if (notes.length === 0) return '';
      const sorted = sortPockets(notes, order);
      let html = '<section class="pockets-section" data-pockets>';
      html += '<div class="pockets-divider" aria-hidden="true"></div>';
      html += '<div class="pockets-header">';
      html += '<span class="pockets-eyebrow">inside cover</span>';
      html += '<button class="pockets-order" id="pockets-order-btn" type="button" title="flip ordering">' + pocketsOrderLabel(order) + '</button>';
      html += '</div>';
      html += '<div class="pockets-list">';
      sorted.forEach((n) => {
        const cls = 'pocket-card-readonly is-' + n.layer;
        html += '<article class="' + cls + '">';
        html += '<span class="pocket-layer-chip" title="' + n.layer + ' pocket">' + pocketLayerShort(n.layer) + '</span>';
        html += '<div class="pocket-body">' + (n.html || '') + '</div>';
        html += '</article>';
      });
      html += '</div>';
      html += '</section>';
      return html;
    }

    function measureFgAnchors() {
      const colEl = document.getElementById('margin-column');
      const fgSection = document.querySelector('section[data-layer="foreground"]');
      if (!colEl || !fgSection) return {};
      const colTop = colEl.getBoundingClientRect().top;
      const out = {};
      fgSection.querySelectorAll('[data-anchor]').forEach((el) => {
        const id = el.getAttribute('data-anchor');
        if (!id) return;
        const r = el.getBoundingClientRect();
        out[id] = r.top - colTop;
      });
      return out;
    }

    function renderMarginNotes(letter, visibility, offsets) {
      // Margin notes live at midground level and reference fg passages,
      // so they only render when both fg and mg are visible.
      if (!visibility.foreground || !visibility.midground) return '';
      const notes = getMarginNotes(letter);
      if (notes.length === 0) return '';
      // Group by anchor; skip orphans (anchor not present in current fg).
      const grouped = new Map();
      notes.forEach((n) => {
        if (!Object.prototype.hasOwnProperty.call(offsets, n.anchorId)) return;
        const arr = grouped.get(n.anchorId) || [];
        arr.push(n);
        grouped.set(n.anchorId, arr);
      });
      const entries = [...grouped.entries()].sort((a, b) => offsets[a[0]] - offsets[b[0]]);
      let html = '';
      entries.forEach(([anchorId, group]) => {
        const sorted = group.slice().sort((a, b) =>
          String(a.createdAt || '').localeCompare(String(b.createdAt || ''))
        );
        html += '<div class="margin-group" style="top:' + (offsets[anchorId] || 0) + 'px">';
        sorted.forEach((n) => {
          html += '<article class="margin-note-readonly">';
          html += '<span class="margin-anchor-ref" title="anchored to ' + anchorId + '">' + anchorId + '</span>';
          html += '<div class="margin-body">' + (n.html || '') + '</div>';
          html += '</article>';
        });
        html += '</div>';
      });
      return html;
    }

    // ── the public snapshot (ROADMAP.md week 7) ──────────────────────────
    // A stranger has no localStorage here — loadLettersList() above returns
    // [] for them. This is the fallback: the same unauthenticated read path
    // marginalia's diorama already uses, hand-rolled (not imported from
    // @woodles/sync) because this is a plain, no-build static page — matches
    // this file's existing pattern of duplicating write's helpers inline
    // (see ARCHITECTURE.md's cross-app-duplication section). Slug must match
    // ECHOES_PUBLIC_SLUG in packages/sync/src/publicBlobs.ts.
    //
    // Cached under its own key, never LETTERS_KEY — that key means "my own
    // letters, written by write" (Z's device), and must stay that way so it
    // keeps winning as her always-fresh, no-network fast path. A visitor's
    // cache lives separately so a later visit still tries the network first
    // (picking up a fresh publish) and only falls back to what was cached
    // the last time the fetch actually succeeded.
    const ECHOES_PUBLIC_SLUG = 'letters';
    const ECHOES_PUBLIC_CACHE_KEY = 'woodles_echoes_public_cache';

    function readCachedPublicLetters() {
      try {
        const parsed = JSON.parse(localStorage.getItem(ECHOES_PUBLIC_CACHE_KEY) || 'null');
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }
    function writeCachedPublicLetters(letters) {
      try { localStorage.setItem(ECHOES_PUBLIC_CACHE_KEY, JSON.stringify(letters)); } catch (e) {}
    }
    async function fetchPublicEchoes() {
      try {
        const res = await fetch('/api/public?app=echoes&slug=' + encodeURIComponent(ECHOES_PUBLIC_SLUG));
        if (!res.ok) throw new Error('bad status ' + res.status);
        const data = await res.json();
        const letters = (data && data.blob && Array.isArray(data.blob.letters)) ? data.blob.letters : [];
        if (letters.length > 0) writeCachedPublicLetters(letters);
        return letters;
      } catch (e) {
        return readCachedPublicLetters();
      }
    }

    (async () => {
    try {
      const localLettersList = loadLettersList();
      // Z's own device always has this populated (via write) and always
      // wins — her fast path, no network involved. Only a visitor with
      // nothing local falls through to the public fetch.
      const lettersList = localLettersList.length > 0 ? localLettersList : await fetchPublicEchoes();
      const params = new URLSearchParams(window.location.search);
      const requestedId = params.get('id');
      const letter = pickLetter(lettersList, requestedId);
      if (!letter) throw new Error('empty');
      applyTokens(letter);

      const visibility = loadVisibility();
      let pocketsOrder = loadPocketsOrder();
      const sourceLetter = letter.replyTo ? findLetterInList(lettersList, letter.replyTo) : null;
      const responseLetters = lettersList
        .filter(function (l) { return l.replyTo === letter.id; })
        .sort(function (a, b) {
          return String(b.publishedAt || '').localeCompare(String(a.publishedAt || ''));
        });

      function renderBreadcrumb() {
        if (!sourceLetter) return '';
        return (
          '<a class="reply-breadcrumb" href="/letter?id=' + sourceLetter.id + '" title="back to source letter">' +
            '<span class="reply-breadcrumb-eyebrow">in reply to</span>' +
            '<span class="reply-breadcrumb-title">' + escapeHtml(sourceLetter.title || 'untitled letter') + '</span>' +
            '<span class="reply-breadcrumb-arrow" aria-hidden="true">↗</span>' +
          '</a>'
        );
      }

      function htmlSnippet(html, max) {
        const text = String(html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        if (!text) return '';
        if (text.length <= max) return text;
        return text.slice(0, max).replace(/\s+\S*$/, '') + '…';
      }

      function renderResponses() {
        if (responseLetters.length === 0) return '';
        let html = '<section class="responses-section">';
        html += '<div class="responses-divider" aria-hidden="true"></div>';
        html += '<span class="responses-eyebrow">responses · ' + responseLetters.length + '</span>';
        html += '<div class="responses-list">';
        responseLetters.forEach(function (r) {
          const fgHtml = (r.layers && r.layers.foreground && r.layers.foreground.html) || r.content || '';
          const snippet = htmlSnippet(fgHtml, 160);
          html += '<a class="response-card" href="/letter?id=' + r.id + '">';
          html += '<span class="response-card-meta">';
          html += '<span class="response-card-issue">' + formatIssue(r.issue || 1) + '</span>';
          html += '<span>·</span>';
          html += '<span class="response-card-date">' + formatDate(r.publishedAt) + '</span>';
          html += '</span>';
          html += '<h3 class="response-card-title">' + escapeHtml(r.title || 'untitled letter') + '</h3>';
          if (snippet) html += '<p class="response-card-snippet">' + escapeHtml(snippet) + '</p>';
          html += '</a>';
        });
        html += '</div>';
        html += '</section>';
        return html;
      }

      function renderRespondCta() {
        return (
          '<div class="respond-cta-wrap">' +
            '<a class="respond-cta" href="/write?reply=' + letter.id + '">' +
              '<span class="respond-cta-arrow">→</span>' +
              '<span>write a response</span>' +
            '</a>' +
          '</div>'
        );
      }

      wrap.innerHTML =
        renderBreadcrumb() +
        '<div class="letter-header">' +
          '<p class="letter-pub">echoes &nbsp;·&nbsp; ' + formatIssue(letter.issue || 1) + ' &nbsp;·&nbsp; ' + formatDate(letter.publishedAt) + '</p>' +
          '<h1 class="letter-title">' + escapeHtml(letter.title) + '</h1>' +
          '<div class="letter-divider"></div>' +
        '</div>' +
        '<div id="layer-stack">' + renderLayers(letter, visibility) + '</div>' +
        '<div id="pockets-mount">' + renderPockets(letter, visibility, pocketsOrder) + '</div>' +
        renderResponses() +
        renderRespondCta() +
        '<footer class="letter-footer">' +
          '<span class="letter-sig">woodles.space &nbsp;·&nbsp; echoes</span>' +
          '<a href="/write' + (letter.replyTo ? '?reply=' + letter.replyTo : '') + '" class="edit-link">edit →</a>' +
        '</footer>';

      function rerenderPockets() {
        const mount = document.getElementById('pockets-mount');
        if (!mount) return;
        mount.innerHTML = renderPockets(letter, visibility, pocketsOrder);
        bindPocketsOrderBtn();
      }
      function bindPocketsOrderBtn() {
        const btn = document.getElementById('pockets-order-btn');
        if (!btn) return;
        btn.onclick = () => {
          pocketsOrder = pocketsOrder === 'oldest' ? 'newest' : 'oldest';
          savePocketsOrder(pocketsOrder);
          rerenderPockets();
        };
      }

      function rerenderMargins() {
        const colEl = document.getElementById('margin-column');
        if (!colEl) return;
        // Hide the entire column visually when fg or mg is off — pocket
        // notes still belong on the page (they live at the bottom),
        // but margin annotations need their fg passage AND the mg layer
        // open.
        const showCol = visibility.foreground && visibility.midground;
        colEl.classList.toggle('hidden', !showCol);
        if (!showCol) {
          colEl.innerHTML = '';
          return;
        }
        const offsets = measureFgAnchors();
        colEl.innerHTML = renderMarginNotes(letter, visibility, offsets);
      }

      function onToggleLayer(id) {
        visibility[id] = !visibility[id];
        saveVisibility(visibility);
        const section = wrap.querySelector('section[data-layer="' + id + '"]');
        if (section) {
          if (visibility[id]) section.removeAttribute('hidden');
          else section.setAttribute('hidden', '');
        }
        renderToggles(letter, visibility, onToggleLayer);
        // Pocket notes inherit their layer's visibility, so re-render when
        // mg or bg flips. Margin notes need both fg and mg visible.
        if (id === 'midground' || id === 'background') rerenderPockets();
        // Defer to next frame so the DOM reflects the toggled section
        // before we measure fg anchors.
        requestAnimationFrame(rerenderMargins);
      }
      renderToggles(letter, visibility, onToggleLayer);
      bindPocketsOrderBtn();
      // Initial margin render needs layout to settle so getBoundingClientRect
      // returns real values.
      requestAnimationFrame(rerenderMargins);
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => requestAnimationFrame(rerenderMargins), 80);
      });

      // ── binder ──
      let binderOpen = null;
      let pocketsFilter = 'all';

      function stripTags(html) {
        return String(html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      }
      function countWords(html) {
        const t = stripTags(html);
        return t ? t.split(/\s+/).filter((w) => w.length).length : 0;
      }
      function previewText(html, max) {
        const m = max == null ? 90 : max;
        const t = stripTags(html);
        if (!t) return '';
        if (t.length <= m) return t;
        return t.slice(0, m).replace(/\s+\S*$/, '') + '…';
      }

      function renderBinderLayers() {
        const layers = getLayers(letter);
        let html = '<header class="binder-header"><span class="binder-header-eyebrow">binder</span><span class="binder-header-title">layers</span></header>';
        html += '<div class="binder-body">';
        ['foreground', 'midground', 'background'].forEach((id) => {
          const lh = layers[id].html;
          const empty = isEmptyHtml(lh);
          const words = countWords(lh);
          const prev = empty ? 'empty' : previewText(lh);
          const visible = !!visibility[id];
          html += '<button class="binder-row layer-row' + (visible ? ' active' : '') + '" data-layer-toggle="' + id + '"' + (empty ? ' disabled' : '') + '>';
          html += '<span class="binder-row-head">';
          html += '<span class="binder-row-name">' + id + '</span>';
          html += '<span class="binder-chip' + (visible ? ' binder-chip-on' : '') + '">' + (visible ? 'on' : 'off') + '</span>';
          html += '</span>';
          html += '<span class="binder-row-meta">' + words + ' word' + (words === 1 ? '' : 's') + '</span>';
          html += '<span class="binder-row-preview' + (empty ? ' dim' : '') + '">' + escapeHtml(prev) + '</span>';
          html += '</button>';
        });
        html += '</div>';
        return html;
      }

      // Aggregate pockets/margins across all letters with source metadata.
      function aggregatePockets() {
        const out = [];
        lettersList.forEach(function (l) {
          const notes = getPocketNotes(l);
          notes.forEach(function (n) {
            out.push({
              id: n.id,
              html: n.html,
              layer: n.layer,
              createdAt: n.createdAt,
              sourceId: l.id,
              sourceTitle: l.title || 'untitled letter',
              isCurrent: l.id === letter.id
            });
          });
        });
        return out;
      }

      function passageFromLetterHtml(html, anchorId) {
        if (typeof DOMParser === 'undefined') return '';
        try {
          const doc = new DOMParser().parseFromString('<div id="__r">' + (html || '') + '</div>', 'text/html');
          const block = doc.querySelector('[data-anchor="' + anchorId + '"]');
          return block ? (block.textContent || '') : '';
        } catch (e) { return ''; }
      }

      function aggregateMargins() {
        const out = [];
        lettersList.forEach(function (l) {
          const notes = getMarginNotes(l);
          if (notes.length === 0) return;
          const fgHtml = (l.layers && l.layers.foreground && l.layers.foreground.html) || l.content || '';
          notes.forEach(function (n) {
            const passage = passageFromLetterHtml(fgHtml, n.anchorId);
            if (!passage) return; // skip orphans
            out.push({
              id: n.id,
              anchorId: n.anchorId,
              preview: previewText(n.html, 70) || '(empty note)',
              passage: previewText(passage, 90),
              sourceId: l.id,
              sourceTitle: l.title || 'untitled letter',
              isCurrent: l.id === letter.id
            });
          });
        });
        return out;
      }

      function renderBinderPockets() {
        const all = aggregatePockets();
        const filtered = pocketsFilter === 'all' ? all : all.filter(function (n) { return n.layer === pocketsFilter; });
        const sorted = filtered.slice().sort(function (a, b) {
          return pocketsOrder === 'oldest'
            ? String(a.createdAt || '').localeCompare(String(b.createdAt || ''))
            : String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
        });
        let html = '<header class="binder-header"><span class="binder-header-eyebrow">binder · across all letters</span><span class="binder-header-title">pockets · ' + all.length + '</span></header>';
        html += '<div class="binder-controls">';
        html += '<div class="binder-filter">';
        ['all', 'midground', 'background'].forEach(function (f) {
          const lab = f === 'all' ? 'all' : (f === 'midground' ? 'mg' : 'bg');
          html += '<button class="binder-filter-btn' + (pocketsFilter === f ? ' active' : '') + '" data-pf="' + f + '">' + lab + '</button>';
        });
        html += '</div>';
        html += '<button class="binder-sort" id="binder-sort-pockets">' + (pocketsOrder === 'oldest' ? 'oldest ↓' : 'newest ↑') + '</button>';
        html += '</div>';
        html += '<div class="binder-body">';
        if (sorted.length === 0) {
          html += '<p class="binder-empty">nothing here.</p>';
        } else {
          sorted.forEach(function (n) {
            const lab = n.layer === 'midground' ? 'mg' : 'bg';
            const empty = isEmptyHtml(n.html);
            const prev = empty ? '(empty)' : previewText(n.html, 110);
            html += '<button class="binder-row pocket-row pocket-row-' + n.layer + '" data-pocket-id="' + n.id + '" data-pocket-layer="' + n.layer + '" data-pocket-source="' + n.sourceId + '">';
            html += '<span class="binder-row-head">';
            html += '<span class="binder-chip">' + lab + '</span>';
            if (!n.isCurrent) {
              html += '<span class="binder-source-chip" title="from another letter">' + escapeHtml(n.sourceTitle) + ' ↗</span>';
            }
            html += '</span>';
            html += '<span class="binder-row-preview' + (empty ? ' dim' : '') + '">' + escapeHtml(prev) + '</span>';
            html += '</button>';
          });
        }
        html += '</div>';
        return html;
      }

      function renderBinderNotes() {
        const entries = aggregateMargins();
        entries.sort(function (a, b) {
          // Group by source first (current first), then by anchor.
          if (a.isCurrent !== b.isCurrent) return a.isCurrent ? -1 : 1;
          if (a.sourceId !== b.sourceId) return String(a.sourceTitle).localeCompare(String(b.sourceTitle));
          return a.anchorId.localeCompare(b.anchorId);
        });
        let html = '<header class="binder-header"><span class="binder-header-eyebrow">binder · across all letters</span><span class="binder-header-title">margin notes · ' + entries.length + '</span></header>';
        html += '<div class="binder-body">';
        if (entries.length === 0) {
          html += '<p class="binder-empty">no margin notes here.</p>';
        } else {
          entries.forEach(function (e) {
            html += '<button class="binder-row margin-row" data-anchor-jump="' + e.anchorId + '" data-anchor-source="' + e.sourceId + '">';
            html += '<span class="binder-row-head">';
            html += '<span class="binder-chip binder-chip-anchor">' + e.anchorId + '</span>';
            if (!e.isCurrent) {
              html += '<span class="binder-source-chip" title="from another letter">' + escapeHtml(e.sourceTitle) + ' ↗</span>';
            }
            html += '</span>';
            html += '<span class="binder-row-passage">' + escapeHtml(e.passage || '(passage missing)') + '</span>';
            html += '<span class="binder-row-preview">' + escapeHtml(e.preview) + '</span>';
            html += '</button>';
          });
        }
        html += '</div>';
        return html;
      }

      function rerenderBinder() {
        const panel = document.getElementById('binder-panel');
        if (!panel) return;
        // Update tab active state
        ['layers', 'pockets', 'notes'].forEach((t) => {
          const btn = document.getElementById('binder-tab-' + t);
          if (btn) {
            btn.classList.toggle('active', binderOpen === t);
            btn.setAttribute('aria-selected', binderOpen === t ? 'true' : 'false');
          }
        });
        panel.classList.toggle('open', binderOpen !== null);
        panel.setAttribute('aria-hidden', binderOpen === null ? 'true' : 'false');
        if (binderOpen === 'layers') panel.innerHTML = renderBinderLayers();
        else if (binderOpen === 'pockets') panel.innerHTML = renderBinderPockets();
        else if (binderOpen === 'notes') panel.innerHTML = renderBinderNotes();
        else panel.innerHTML = '';
        bindBinderActions();
      }

      function bindBinderActions() {
        // Layer toggles inside the binder mirror the topbar toggles.
        document.querySelectorAll('[data-layer-toggle]').forEach((el) => {
          el.addEventListener('click', () => {
            const id = el.getAttribute('data-layer-toggle');
            if (!id) return;
            // Reuse existing toggle path so margin re-render fires correctly.
            onToggleLayer(id);
            rerenderBinder();
          });
        });
        // Pocket filter chips.
        document.querySelectorAll('[data-pf]').forEach((el) => {
          el.addEventListener('click', () => {
            pocketsFilter = el.getAttribute('data-pf') || 'all';
            rerenderBinder();
          });
        });
        // Sort flip from binder.
        const sortBtn = document.getElementById('binder-sort-pockets');
        if (sortBtn) {
          sortBtn.addEventListener('click', () => {
            pocketsOrder = pocketsOrder === 'oldest' ? 'newest' : 'oldest';
            savePocketsOrder(pocketsOrder);
            rerenderPockets();
            rerenderBinder();
          });
        }
        // Pocket click → if cross-doc, navigate. If same doc, ensure layer on,
        // scroll to inside cover.
        document.querySelectorAll('[data-pocket-id]').forEach((el) => {
          el.addEventListener('click', () => {
            const sourceId = el.getAttribute('data-pocket-source');
            if (sourceId && sourceId !== letter.id) {
              window.location.href = '/letter?id=' + sourceId;
              return;
            }
            const layerNeeded = el.getAttribute('data-pocket-layer') || 'midground';
            if (!visibility[layerNeeded]) {
              onToggleLayer(layerNeeded);
            }
            requestAnimationFrame(() => {
              const section = document.querySelector('section[data-pockets]');
              if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
            });
          });
        });
        // Margin note click → if cross-doc, navigate. If same doc, ensure
        // fg + mg on, scroll to anchor, flash.
        document.querySelectorAll('[data-anchor-jump]').forEach((el) => {
          el.addEventListener('click', () => {
            const sourceId = el.getAttribute('data-anchor-source');
            if (sourceId && sourceId !== letter.id) {
              window.location.href = '/letter?id=' + sourceId;
              return;
            }
            const anchorId = el.getAttribute('data-anchor-jump');
            if (!anchorId) return;
            let toggled = false;
            if (!visibility.foreground) { onToggleLayer('foreground'); toggled = true; }
            if (!visibility.midground) { onToggleLayer('midground'); toggled = true; }
            const doScroll = () => {
              const block = document.querySelector('section[data-layer="foreground"] [data-anchor="' + anchorId + '"]');
              if (!block) return;
              block.scrollIntoView({ behavior: 'smooth', block: 'center' });
              block.classList.add('anchor-flash');
              setTimeout(() => block.classList.remove('anchor-flash'), 1200);
            };
            if (toggled) {
              // Wait for layer toggle re-render before measuring.
              requestAnimationFrame(() => requestAnimationFrame(doScroll));
            } else {
              requestAnimationFrame(doScroll);
            }
          });
        });
      }

      function toggleBinder(tab) {
        binderOpen = binderOpen === tab ? null : tab;
        rerenderBinder();
      }

      ['layers', 'pockets', 'notes'].forEach((t) => {
        const btn = document.getElementById('binder-tab-' + t);
        if (btn) btn.addEventListener('click', () => toggleBinder(t));
      });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && binderOpen) {
          binderOpen = null;
          rerenderBinder();
        }
      });

    } catch(e) {
      applyTokens(null);
      wrap.innerHTML =
        '<div class="empty-state">' +
          '<p class="empty-title">nothing here yet.</p>' +
          '<p class="empty-sub">write your first letter</p>' +
          '<a href="/write" class="write-link">write →</a>' +
        '</div>';
    }
    })();
  </script>

</body>
</html>
