<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>echoes · woodles.space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/shared/fonts.css" />
  <link rel="stylesheet" href="/shared/palette.css" />
  <link rel="stylesheet" href="/shared/motifs.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--letter-mono, var(--font-mono));
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 1.6rem;
      background: var(--surface);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
    }
    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--lavender) 20%, var(--aqua) 45%, var(--peach) 65%, var(--lilac) 80%, transparent 100%);
      background-size: 220% 100%;
      animation: bar-shimmer 11s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes bar-shimmer {
      0% { background-position: 0% 0; }
      50% { background-position: 100% 0; }
      100% { background-position: 0% 0; }
    }
    .topbar-brand {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-decoration: none;
      position: relative;
      z-index: 1;
      color: var(--muted);
    }
    .topbar-brand:hover { color: var(--accent-strong); }
    .topbar-label {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.45;
      margin-left: 1.2rem;
      position: relative;
      z-index: 1;
    }
    .topbar-clock {
      margin-left: auto;
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.60rem;
      letter-spacing: 0.10em;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      position: relative;
      z-index: 1;
    }
    .clock-date { color: var(--muted); opacity: 0.7; }
    .clock-sep  { color: var(--accent); opacity: 0.9; }
    .clock-time { color: var(--text); opacity: 0.8; }
    .clock-time.tick { animation: tick-fade 0.45s ease; }
    @keyframes tick-fade {
      0%  { opacity: 0.8; }
      20% { opacity: 0.3; }
      100%{ opacity: 0.8; }
    }

    /* ── letter layout ── */
    .letter-wrap {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      padding: 88px clamp(1.5rem, 5vw, 2.5rem) 8rem;
      opacity: 0;
      animation: motif-rise 1s ease forwards 0.1s;
    }

    .letter-header { margin-bottom: 3rem; }
    .letter-pub {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
      margin-bottom: 1.4rem;
    }
    .letter-title {
      font-family: var(--letter-display, var(--font-display));
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      line-height: 1.08;
      margin-bottom: 1.8rem;
    }
    .letter-divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender), var(--aqua), transparent);
    }

    .letter-body {
      font-family: var(--letter-body, var(--font-body));
      font-size: 1.08rem;
      line-height: 1.92;
      color: var(--text);
      margin-top: 2.8rem;
    }
    /* Force inheritance over any leftover inline font-family from
     * pasted/imported content. The viewer also sanitizes HTML on render
     * (sanitizeHtml below) — this rule is a defensive belt. */
    .letter-body * { font-family: inherit; }
    .letter-body h1, .letter-body h2, .letter-body h3 {
      font-family: var(--letter-display, var(--font-display));
    }

    /* ── layers ── */
    .layer { transition: opacity 0.4s ease; }
    .layer[hidden] { display: none; }
    .layer-eyebrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
      margin-top: 3.4rem;
      margin-bottom: 0.9rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--rule);
    }
    .layer-midground {
      font-size: 0.97rem;
      line-height: 1.78;
      color: var(--muted);
      max-width: 88%;
      margin-left: 6%;
    }
    .layer-background {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--muted);
      opacity: 0.78;
      font-style: italic;
      max-width: 78%;
      margin-left: 12%;
    }
    .layer-midground :global(h1), .layer-midground h1,
    .layer-midground :global(h2), .layer-midground h2,
    .layer-background h1, .layer-background h2 {
      font-size: 1.05rem;
      font-style: italic;
      color: var(--accent-deep);
      margin: 1.2em 0 0.3em;
    }

    /* ── topbar layer toggles ── */
    .layer-toggles {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: 1.4rem;
      position: relative;
      z-index: 1;
    }
    .layer-tog {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      background: none;
      border: 1px solid transparent;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.4;
      transition: color 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
    }
    .layer-tog:hover { opacity: 0.85; color: var(--accent-strong); }
    .layer-tog.on {
      color: var(--accent-strong);
      opacity: 1;
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .topbar-divider {
      display: inline-block;
      width: 1px;
      height: 14px;
      background: var(--rule);
      margin: 0 0.9rem;
      opacity: 0.6;
      position: relative;
      z-index: 1;
    }
    .topbar-divider[hidden] { display: none; }
    .pockets-tog {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      background: none;
      border: 1px solid transparent;
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.5;
      display: inline-flex;
      align-items: center;
      gap: 0.45em;
      position: relative;
      z-index: 1;
      transition: color 0.22s ease, background 0.22s ease, border-color 0.22s ease, opacity 0.22s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pockets-tog:hover { opacity: 0.9; color: var(--accent-strong); }
    .pockets-tog.on {
      color: var(--accent-strong);
      opacity: 1;
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      transform: translateY(-1px);
    }
    .pockets-tog[hidden] { display: none; }
    .pockets-tog-count {
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent-strong);
      opacity: 0.85;
    }

    /* ── pockets (inside cover) ── */
    .pockets-section {
      margin-top: 3.6rem;
      animation: pocket-rise 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pockets-section[hidden] { display: none; }
    @keyframes pocket-rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pockets-divider {
      height: 1px;
      width: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--rule) 18%,
        color-mix(in srgb, var(--accent) 35%, transparent) 50%,
        var(--rule) 82%,
        transparent 100%
      );
      opacity: 0.7;
      margin-bottom: 1.4rem;
    }
    .pockets-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .pockets-eyebrow {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
    }
    .pockets-order {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--muted);
      background: none;
      border: 1px dashed transparent;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.55;
      transition: color 0.18s ease, border-color 0.18s ease, opacity 0.18s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pockets-order:hover {
      opacity: 0.95;
      color: var(--accent-strong);
      border-color: color-mix(in srgb, var(--accent) 35%, transparent);
      transform: translateY(-1px);
    }
    .pockets-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .pocket-card-readonly {
      position: relative;
      padding: 0.95rem 1.2rem;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 55%, transparent);
    }
    .pocket-card-readonly.is-background {
      background: color-mix(in srgb, var(--surface) 35%, transparent);
      border-style: dashed;
      opacity: 0.92;
    }
    .pocket-layer-chip {
      position: absolute;
      top: 0.5rem;
      left: 0.55rem;
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      padding: 1px 5px;
      border-radius: 6px;
      opacity: 0.6;
      pointer-events: none;
    }
    .pocket-card-readonly.is-background .pocket-layer-chip {
      color: var(--accent-deep);
      opacity: 0.7;
    }
    .pocket-card-readonly .pocket-body {
      font-family: var(--letter-body, var(--font-body));
      font-size: 0.96rem;
      line-height: 1.65;
      color: var(--text);
      margin-top: 0.6rem;
    }
    .pocket-card-readonly .pocket-body * { font-family: var(--letter-body, var(--font-body)); }
    .pocket-card-readonly.is-background .pocket-body {
      font-style: italic;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .pocket-card-readonly .pocket-body strong { font-weight: 600; }
    .pocket-card-readonly .pocket-body em { font-style: italic; }
    .pocket-card-readonly .pocket-body p { margin-bottom: 0.6em; }
    .pocket-card-readonly .pocket-body p:last-child { margin-bottom: 0; }

    /* ── margin notes (right-margin annotations on fg passages) ── */
    .letter-page {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 2.4rem;
    }
    .margin-column {
      position: relative;
      width: 280px;
      flex-shrink: 0;
      padding-top: 88px;
      padding-bottom: 8rem;
      min-height: 100vh;
    }
    .margin-column.hidden { visibility: hidden; }
    .margin-group {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      transition: top 0.18s ease;
    }
    .margin-note-readonly {
      position: relative;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
    }
    .margin-anchor-ref {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.48rem;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--muted);
      opacity: 0.45;
      display: block;
      margin-bottom: 0.35rem;
    }
    .margin-note-readonly .margin-body {
      font-family: var(--letter-body, var(--font-body));
      font-size: 0.86rem;
      line-height: 1.55;
      color: var(--muted);
      font-style: italic;
    }
    .margin-note-readonly .margin-body * { font-family: var(--letter-body, var(--font-body)); }
    .margin-note-readonly .margin-body strong { font-weight: 600; font-style: italic; }
    .margin-note-readonly .margin-body em { font-style: normal; }
    .margin-note-readonly .margin-body p { margin-bottom: 0.4em; }
    .margin-note-readonly .margin-body p:last-child { margin-bottom: 0; }

    @media (max-width: 1100px) {
      .letter-page {
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .margin-column {
        width: 100%;
        max-width: 640px;
        min-height: 0;
        padding-top: 0;
        padding-bottom: 1rem;
      }
      .margin-column.hidden { display: none; visibility: visible; }
      .margin-group {
        position: static;
        margin: 0 clamp(1.5rem, 5vw, 2.5rem) 0.6rem;
      }
    }
    .letter-body h1 {
      font-family: var(--letter-display, var(--font-display));
      font-size: 2rem;
      font-weight: 300;
      color: var(--accent-strong);
      line-height: 1.15;
      margin: 2em 0 0.5em;
    }
    .letter-body h2 {
      font-family: var(--letter-display, var(--font-display));
      font-size: 1.35rem;
      font-weight: 300;
      font-style: italic;
      color: var(--accent-deep);
      line-height: 1.2;
      margin: 1.6em 0 0.4em;
    }
    .letter-body p { margin-bottom: 1.1em; }
    .letter-body p:last-child { margin-bottom: 0; }
    .letter-body blockquote {
      border-left: 2px solid var(--accent);
      padding: 0.1em 0 0.1em 1.3em;
      margin: 1.5em 0;
      font-style: italic;
      color: var(--muted);
    }
    .letter-body ul, .letter-body ol { padding-left: 1.5em; margin: 0.9em 0; }
    .letter-body li { margin-bottom: 0.25em; }
    .letter-body a { color: var(--accent-strong); text-decoration: none; border-bottom: 1px solid var(--rule); }
    .letter-body a:hover { border-bottom-color: var(--accent-strong); }
    .letter-body strong { font-weight: 600; }
    .letter-body em { font-style: italic; }

    .letter-footer {
      margin-top: 5rem;
      padding-top: 1.8rem;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .letter-sig {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.45;
    }
    .edit-link {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.57rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: color 0.15s ease, border-color 0.15s ease;
      opacity: 0.5;
    }
    .edit-link:hover { color: var(--accent-strong); border-color: var(--accent); opacity: 1; }

    .empty-state { text-align: center; padding-top: 6rem; }
    .empty-title {
      font-family: var(--letter-display, var(--font-display));
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      color: var(--accent-strong);
      opacity: 0.4;
      margin-bottom: 1.2rem;
    }
    .empty-sub {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.60rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      opacity: 0.4;
      margin-bottom: 2rem;
    }
    .write-link {
      font-family: var(--letter-mono, var(--font-mono));
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent-strong);
      text-decoration: none;
      padding: 8px 24px;
      border-radius: 100px;
      transition: background 0.2s ease;
    }
    .write-link:hover { background: var(--accent-deep); }
  </style>
</head>
<body>

  <div class="motif-grain"></div>
  <div class="motif-blob motif-blob-1"></div>
  <div class="motif-blob motif-blob-2"></div>
  <div class="motif-blob motif-blob-3"></div>
  <div class="motif-blob motif-blob-4"></div>

  <header class="topbar">
    <a href="/" class="topbar-brand">.space</a>
    <span class="topbar-label">echoes</span>
    <div class="layer-toggles" id="layer-toggles" role="group" aria-label="layers"></div>
    <div class="topbar-clock">
      <span class="clock-date" id="clock-date"></span>
      <span class="clock-sep">·</span>
      <span class="clock-time" id="clock-time"></span>
    </div>
  </header>

  <div class="letter-page">
    <div class="letter-wrap" id="letter-wrap"></div>
    <aside class="margin-column" id="margin-column" aria-label="margin notes"></aside>
  </div>

  <script type="module">
    import { findFont, findPalette, findMotif } from '/shared/library.js';

    /* ── clock ── */
    const DAYS   = ['sun','mon','tue','wed','thu','fri','sat'];
    const MONTHS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const dateEl = document.getElementById('clock-date');
    const timeEl = document.getElementById('clock-time');
    function pad(n) { return String(n).padStart(2,'0'); }
    function tick() {
      const now = new Date();
      dateEl.textContent = DAYS[now.getDay()] + ' ' + pad(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
      const t = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
      if (timeEl.textContent !== t) {
        timeEl.classList.remove('tick'); void timeEl.offsetWidth; timeEl.classList.add('tick');
        timeEl.textContent = t;
      }
    }
    tick(); setInterval(tick, 1000);

    /* ── apply theme/motif/font tokens to body ── */
    function applyTokens(letter) {
      const palette = findPalette(letter && letter.theme);
      const motif = findMotif(letter && letter.motif);
      const font = findFont(letter && letter.font);
      document.body.dataset.theme = palette.id;
      document.body.classList.add('motif-' + motif.id);
      document.body.style.setProperty('--letter-display', font.display);
      document.body.style.setProperty('--letter-body', font.body);
      document.body.style.setProperty('--letter-mono', font.mono);
    }

    /* ── render letter ── */
    const wrap = document.getElementById('letter-wrap');

    function formatDate(iso) {
      const d = new Date(iso);
      return DAYS[d.getDay()] + ' ' + pad(d.getDate()) + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    }
    function formatIssue(n) {
      return '№ ' + String(n).padStart(3, '0');
    }
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── layer visibility ── */
    const VIS_KEY = 'woodles_layer_visibility';
    const POCKETS_ORDER_KEY = 'woodles_pockets_order';
    const LAYER_IDS = ['foreground', 'midground', 'background'];
    const LAYER_LABELS = { foreground: 'fg', midground: 'mg', background: 'bg' };
    const DEFAULT_VIS = { foreground: true, midground: false, background: false };

    function loadVisibility() {
      try {
        const raw = localStorage.getItem(VIS_KEY);
        if (!raw) return { ...DEFAULT_VIS };
        const v = JSON.parse(raw);
        return {
          foreground: v.foreground !== false, // default on
          midground: !!v.midground,
          background: !!v.background
        };
      } catch (e) {
        return { ...DEFAULT_VIS };
      }
    }
    function saveVisibility(v) {
      try { localStorage.setItem(VIS_KEY, JSON.stringify(v)); } catch (e) {}
    }

    function loadPocketsOrder() {
      try {
        const o = localStorage.getItem(POCKETS_ORDER_KEY);
        return (o === 'newest' || o === 'oldest') ? o : 'oldest';
      } catch (e) { return 'oldest'; }
    }
    function savePocketsOrder(o) {
      try { localStorage.setItem(POCKETS_ORDER_KEY, o); } catch (e) {}
    }

    /* ── sanitize: strip inline font-family and other style carriers
     * from rendered HTML so the document's font system always wins. */
    function sanitizeHtml(html) {
      if (typeof DOMParser === 'undefined' || !html) return html || '';
      const doc = new DOMParser().parseFromString('<div id="__r">' + html + '</div>', 'text/html');
      const root = doc.getElementById('__r');
      if (!root) return html;
      root.querySelectorAll('*').forEach((el) => {
        el.removeAttribute('style');
        el.removeAttribute('color');
        el.removeAttribute('face');
        el.removeAttribute('size');
        el.removeAttribute('bgcolor');
        if (el.tagName === 'FONT' || el.tagName === 'SPAN') {
          const parent = el.parentNode;
          if (!parent) return;
          while (el.firstChild) parent.insertBefore(el.firstChild, el);
          parent.removeChild(el);
        }
      });
      return root.innerHTML;
    }

    function getLayers(letter) {
      // Migration: synthesize layers from legacy `content` if missing.
      // Sanitize on read so old letters with inline font styles render
      // with the document's chosen font.
      const L = letter.layers || {};
      return {
        foreground: { html: sanitizeHtml((L.foreground && L.foreground.html) || letter.content || '') },
        midground:  { html: sanitizeHtml((L.midground  && L.midground.html)  || '') },
        background: { html: sanitizeHtml((L.background && L.background.html) || '') }
      };
    }

    function isEmptyHtml(html) {
      return String(html || '').replace(/<br\s*\/?>(\s*)/gi, '').replace(/<[^>]+>/g, '').trim().length === 0;
    }

    function renderLayers(letter, visibility) {
      const layers = getLayers(letter);
      let html = '';
      LAYER_IDS.forEach((id) => {
        const layerHtml = layers[id].html;
        if (isEmptyHtml(layerHtml)) return;
        const visible = !!visibility[id];
        const eyebrow = id === 'foreground'
          ? ''
          : '<p class="layer-eyebrow">' + id + '</p>';
        html +=
          '<section class="layer letter-body layer-' + id + '"' + (visible ? '' : ' hidden') + ' data-layer="' + id + '">' +
            eyebrow +
            layerHtml +
          '</section>';
      });
      return html;
    }

    function renderToggles(letter, visibility, onToggle) {
      const layers = getLayers(letter);
      const togglesEl = document.getElementById('layer-toggles');
      togglesEl.innerHTML = '';
      LAYER_IDS.forEach((id) => {
        const empty = isEmptyHtml(layers[id].html);
        const btn = document.createElement('button');
        btn.className = 'layer-tog' + (visibility[id] ? ' on' : '');
        btn.type = 'button';
        btn.textContent = LAYER_LABELS[id];
        btn.title = empty ? id + ' (empty)' : id;
        btn.setAttribute('aria-pressed', visibility[id] ? 'true' : 'false');
        if (empty) { btn.style.opacity = '0.2'; btn.style.cursor = 'default'; }
        else btn.addEventListener('click', () => onToggle(id));
        togglesEl.appendChild(btn);
      });
    }

    function getMarginNotes(letter) {
      const notes = letter && letter.annotations && letter.annotations.marginNotes;
      if (!Array.isArray(notes)) return [];
      return notes.map((n) => ({ ...n, html: sanitizeHtml(n.html || '') }));
    }
    function getPocketNotes(letter) {
      const notes = letter && letter.annotations && letter.annotations.pocketNotes;
      if (!Array.isArray(notes)) return [];
      // Normalize: ensure each note has a layer (default mg) and clean html.
      return notes.map((n) => ({
        ...n,
        layer: n.layer === 'background' ? 'background' : 'midground',
        html: sanitizeHtml(n.html || '')
      }));
    }
    function sortPockets(notes, order) {
      return [...notes].sort((a, b) =>
        order === 'oldest'
          ? String(a.createdAt || '').localeCompare(String(b.createdAt || ''))
          : String(b.createdAt || '').localeCompare(String(a.createdAt || ''))
      );
    }
    function pocketsOrderLabel(order) {
      return order === 'oldest' ? 'oldest first ↓' : 'newest first ↑';
    }
    function pocketLayerShort(layer) {
      return layer === 'background' ? 'bg' : 'mg';
    }
    function renderPockets(letter, visibility, order) {
      const allNotes = getPocketNotes(letter);
      // Filter notes by their layer's visibility (per-note coupling).
      const notes = allNotes.filter((n) => visibility[n.layer]);
      if (notes.length === 0) return '';
      const sorted = sortPockets(notes, order);
      let html = '<section class="pockets-section" data-pockets>';
      html += '<div class="pockets-divider" aria-hidden="true"></div>';
      html += '<div class="pockets-header">';
      html += '<span class="pockets-eyebrow">inside cover</span>';
      html += '<button class="pockets-order" id="pockets-order-btn" type="button" title="flip ordering">' + pocketsOrderLabel(order) + '</button>';
      html += '</div>';
      html += '<div class="pockets-list">';
      sorted.forEach((n) => {
        const cls = 'pocket-card-readonly is-' + n.layer;
        html += '<article class="' + cls + '">';
        html += '<span class="pocket-layer-chip" title="' + n.layer + ' pocket">' + pocketLayerShort(n.layer) + '</span>';
        html += '<div class="pocket-body">' + (n.html || '') + '</div>';
        html += '</article>';
      });
      html += '</div>';
      html += '</section>';
      return html;
    }

    function measureFgAnchors() {
      const colEl = document.getElementById('margin-column');
      const fgSection = document.querySelector('section[data-layer="foreground"]');
      if (!colEl || !fgSection) return {};
      const colTop = colEl.getBoundingClientRect().top;
      const out = {};
      fgSection.querySelectorAll('[data-anchor]').forEach((el) => {
        const id = el.getAttribute('data-anchor');
        if (!id) return;
        const r = el.getBoundingClientRect();
        out[id] = r.top - colTop;
      });
      return out;
    }

    function renderMarginNotes(letter, visibility, offsets) {
      // Margin notes live at midground level and reference fg passages,
      // so they only render when both fg and mg are visible.
      if (!visibility.foreground || !visibility.midground) return '';
      const notes = getMarginNotes(letter);
      if (notes.length === 0) return '';
      // Group by anchor; skip orphans (anchor not present in current fg).
      const grouped = new Map();
      notes.forEach((n) => {
        if (!Object.prototype.hasOwnProperty.call(offsets, n.anchorId)) return;
        const arr = grouped.get(n.anchorId) || [];
        arr.push(n);
        grouped.set(n.anchorId, arr);
      });
      const entries = [...grouped.entries()].sort((a, b) => offsets[a[0]] - offsets[b[0]]);
      let html = '';
      entries.forEach(([anchorId, group]) => {
        const sorted = group.slice().sort((a, b) =>
          String(a.createdAt || '').localeCompare(String(b.createdAt || ''))
        );
        html += '<div class="margin-group" style="top:' + (offsets[anchorId] || 0) + 'px">';
        sorted.forEach((n) => {
          html += '<article class="margin-note-readonly">';
          html += '<span class="margin-anchor-ref" title="anchored to ' + anchorId + '">' + anchorId + '</span>';
          html += '<div class="margin-body">' + (n.html || '') + '</div>';
          html += '</article>';
        });
        html += '</div>';
      });
      return html;
    }

    try {
      const raw = localStorage.getItem('woodles_published');
      if (!raw) throw new Error('empty');
      const letter = JSON.parse(raw);
      applyTokens(letter);

      const visibility = loadVisibility();
      let pocketsOrder = loadPocketsOrder();

      wrap.innerHTML =
        '<div class="letter-header">' +
          '<p class="letter-pub">echoes &nbsp;·&nbsp; ' + formatIssue(letter.issue || 1) + ' &nbsp;·&nbsp; ' + formatDate(letter.publishedAt) + '</p>' +
          '<h1 class="letter-title">' + escapeHtml(letter.title) + '</h1>' +
          '<div class="letter-divider"></div>' +
        '</div>' +
        '<div id="layer-stack">' + renderLayers(letter, visibility) + '</div>' +
        '<div id="pockets-mount">' + renderPockets(letter, visibility, pocketsOrder) + '</div>' +
        '<footer class="letter-footer">' +
          '<span class="letter-sig">woodles.space &nbsp;·&nbsp; echoes</span>' +
          '<a href="/write" class="edit-link">edit →</a>' +
        '</footer>';

      function rerenderPockets() {
        const mount = document.getElementById('pockets-mount');
        if (!mount) return;
        mount.innerHTML = renderPockets(letter, visibility, pocketsOrder);
        bindPocketsOrderBtn();
      }
      function bindPocketsOrderBtn() {
        const btn = document.getElementById('pockets-order-btn');
        if (!btn) return;
        btn.onclick = () => {
          pocketsOrder = pocketsOrder === 'oldest' ? 'newest' : 'oldest';
          savePocketsOrder(pocketsOrder);
          rerenderPockets();
        };
      }

      function rerenderMargins() {
        const colEl = document.getElementById('margin-column');
        if (!colEl) return;
        // Hide the entire column visually when fg or mg is off — pocket
        // notes still belong on the page (they live at the bottom),
        // but margin annotations need their fg passage AND the mg layer
        // open.
        const showCol = visibility.foreground && visibility.midground;
        colEl.classList.toggle('hidden', !showCol);
        if (!showCol) {
          colEl.innerHTML = '';
          return;
        }
        const offsets = measureFgAnchors();
        colEl.innerHTML = renderMarginNotes(letter, visibility, offsets);
      }

      function onToggleLayer(id) {
        visibility[id] = !visibility[id];
        saveVisibility(visibility);
        const section = wrap.querySelector('section[data-layer="' + id + '"]');
        if (section) {
          if (visibility[id]) section.removeAttribute('hidden');
          else section.setAttribute('hidden', '');
        }
        renderToggles(letter, visibility, onToggleLayer);
        // Pocket notes inherit their layer's visibility, so re-render when
        // mg or bg flips. Margin notes need both fg and mg visible.
        if (id === 'midground' || id === 'background') rerenderPockets();
        // Defer to next frame so the DOM reflects the toggled section
        // before we measure fg anchors.
        requestAnimationFrame(rerenderMargins);
      }
      renderToggles(letter, visibility, onToggleLayer);
      bindPocketsOrderBtn();
      // Initial margin render needs layout to settle so getBoundingClientRect
      // returns real values.
      requestAnimationFrame(rerenderMargins);
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => requestAnimationFrame(rerenderMargins), 80);
      });

    } catch(e) {
      applyTokens(null);
      wrap.innerHTML =
        '<div class="empty-state">' +
          '<p class="empty-title">nothing here yet.</p>' +
          '<p class="empty-sub">write your first letter</p>' +
          '<a href="/write" class="write-link">write →</a>' +
        '</div>';
    }
  </script>

</body>
</html>
